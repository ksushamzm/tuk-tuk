<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TukTuk Media - Thai Culture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;0,900;1,300;1,400;1,500;1,900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              roboto: ['Roboto', 'sans-serif'],
              serif: ['Times New Roman', 'serif'],
            },
            colors: {
              'thai-bg': '#EBEBEB',
              'thai-cyan': '#5FDCFF',
              'thai-green': '#029400',
              'thai-dark-green': '#075800',
              'thai-pink': '#FF008C',
              'thai-magenta': '#FF008C',
              'thai-orange': '#FF9500',
              'thai-yellow': '#FFE600',
              'thai-gray': '#D9D9D9',
            },
            boxShadow: {
              'hard': '-6px 6px 0px 0px #000000',
              'hard-sm': '-3px 3px 0px 0px #000000',
            },
            animation: {
              'spin-slow': 'spin 12s linear infinite',
              'marquee': 'marquee 20s linear infinite',
              'marquee-reverse': 'marquee-reverse 20s linear infinite',
            },
            keyframes: {
              marquee: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-100%)' },
              },
              'marquee-reverse': {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(0)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #EBEBEB;
      }
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      .no-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      .text-stroke-1 {
        -webkit-text-stroke: 1px black;
      }
      .text-stroke-2 {
        -webkit-text-stroke: 2px black;
      }
      .text-stroke-white {
        -webkit-text-stroke: 2px white;
      }
      .writing-vertical {
        writing-mode: vertical-rl;
      }
    </style>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
